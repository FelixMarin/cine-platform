<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ sanitized_name }} - Reproducción</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <!-- CSS del reproductor -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/play/play.css') }}?v={{ get_file_version('css/play/play.css') }}">
</head>
<body>
    <div class="container">
        <!-- Sección del reproductor -->
        <section class="video-section">
            <h1>{{ sanitized_name }}</h1>
            <div class="underline"></div>

            <div class="video-wrapper">
                <!-- Usar media_id para streaming (soporta películas y episodios) -->
                <video controls preload="auto" id="videoPlayer">
                    {% if use_direct_path and filename %}
                        <source src="/api/streaming/path/{{ filename }}">
                    {% elif media_id %}
                        <source src="/api/streaming/id/{{ movie_id }}">
                    {% elif media_type == 'serie' %}
                        <source src="/api/streaming/episode/{{ media_path }}">
                    {% else %}
                        <source src="/stream/{{ filename }}">
                    {% endif %}
                </video>

                <div class="video-controls">
                    <!-- Botón Me Gusta -->
                    <button id="likeButton" class="like-btn" title="Me gusta esta película" data-movie-id="{{ movie_id if movie_id else '' }}" data-media-path="{{ media_path if media_path else '' }}" data-title="{{ clean_title if clean_title else sanitized_name }}">
                        <svg class="like-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path>
                        </svg>
                        <span class="like-text">Me gusta</span>
                        <span class="like-spinner" style="display: none;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spinner-icon">
                                <circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle>
                                <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"></path>
                            </svg>
                        </span>
                    </button>
                    
                    {% if is_admin %}
                    <a href="/download/{{ filename }}" class="download-btn">⬇️ Descargar película</a>
                    {% else %}
                    <span class="download-disabled" title="Solo administradores pueden descargar">🔒 Descargar (admin)</span>
                    {% endif %}
                </div>
            </div>
        </section>

        <!-- Sección de información de la película (se carga de forma asíncrona) -->
        <section class="movie-info" id="movie-info-section" style="display: none;">
            <div class="loading-info">
                <p>📽️ Cargando información de la película...</p>
            </div>
        </section>

        <!-- Mensaje si no hay información -->
        <div class="no-info" id="no-movie-info" style="display: none;">
            <p>🎬 No se encontró información adicional para esta película</p>
            <p class="no-info-sub">Puedes seguir viendo la película sin problemas</p>
        </div>
    </div>

    <!-- Datos del medio para carga asíncrona -->
    <div id="movie-data"
         data-title="{{ clean_title | default('') }}"
         data-year="{{ year if year else '' }}"
         data-media-id="{{ media_path if media_path else '' }}"
         data-media-type="{{ media_type if media_type else 'movie' }}"
         data-serie-name="{{ serie_name if serie_name else '' }}"
         style="display: none;">
    </div>

    <script src="{{ url_for('static', filename='js/play/play.js') }}?v={{ get_file_version('js/play/play.js') }}" defer></script>

    <script>
    // 🚨 IMPORTANTE: El video debe empezar INMEDIATAMENTE
    // No esperar a metadatos, no esperar a nada
    (function() {
        // 1. El video YA debería estar descargando por preload="auto"
        // Verificar que existe
        var video = document.getElementById('videoPlayer');
        if (video) {
            var source = video.querySelector('source');
        }

        // 2. Los metadatos se cargan en BACKGROUND (NO bloquea video)
        // Pequeño delay para no competir con la descarga del video
        setTimeout(function() {
            var movieDataEl = document.getElementById('movie-data');
            var cleanTitle = movieDataEl ? movieDataEl.getAttribute('data-title') : '';
            var movieYear = movieDataEl ? movieDataEl.getAttribute('data-year') : '';
            var mediaType = movieDataEl ? movieDataEl.getAttribute('data-media-type') : 'movie';
            var serieName = movieDataEl ? movieDataEl.getAttribute('data-serie-name') : '';
            var mediaPath = movieDataEl ? movieDataEl.getAttribute('data-media-id') : '';

            // Detectar si es una serie basándose en el patrón del filename
            // Esto es necesario para rutas legacy donde no se pasa media_type
            if (!mediaType || mediaType === 'movie') {
                var filename = '';
                var video = document.getElementById('videoPlayer');
                if (video) {
                    var source = video.querySelector('source');
                    if (source) {
                        filename = source.src || '';
                    }
                }

                // Patrones de serie en el filename o URL
                var seriePatterns = [/T\d+C\d+/i, /S\d+E\d+/i, /season\s*\d+/i, /episode\s*\d+/i, /\d+x\d+/];
                for (var i = 0; i < seriePatterns.length; i++) {
                    if (seriePatterns[i].test(cleanTitle) || seriePatterns[i].test(filename)) {
                        mediaType = 'serie';
                        break;
                    }
                }
            }

            if (cleanTitle) {
                // Usar el endpoint correcto según el tipo de medio
                var metadataUrl;
                // Función para limpiar títulos (elimina sufijos como -optimized, (año), T1C01, etc.)
                function cleanMediaTitle(title) {
                    var cleaned = title;
                    // Eliminar patrones de episodio (T1C01, S01E01, etc.)
                    cleaned = cleaned.replace(/T\d+C\d+/gi, '');
                    cleaned = cleaned.replace(/S\d+E\d+/gi, '');
                    cleaned = cleaned.replace(/season\s*\d+/gi, '');
                    cleaned = cleaned.replace(/episode\s*\d+/gi, '');
                    cleaned = cleaned.replace(/\d+x\d+/g, '');
                    // Eliminar palabras comunes de sufijos
                    cleaned = cleaned.replace(/serie/gi, '');
                    cleaned = cleaned.replace(/optimized/gi, '');
                    cleaned = cleaned.replace(/hd/gi, '');
                    cleaned = cleaned.replace(/bluray/gi, '');
                    cleaned = cleaned.replace(/webrip/gi, '');
                    cleaned = cleaned.replace(/web-dl/gi, '');
                    // Eliminar años entre paréntesis
                    cleaned = cleaned.replace(/\([^)]*\)/g, '');
                    // Reemplazar guiones y underscore por espacios
                    cleaned = cleaned.replace(/[-_]/g, ' ');
                    // Eliminar espacios múltiples y trim
                    cleaned = cleaned.replace(/\s+/g, ' ').trim();
                    return cleaned;
                }

                var finalTitle = cleanMediaTitle(cleanTitle);

                if (mediaType === 'serie') {
                    // Para series, usar el nombre de la serie
                    var serieTitle = serieName || finalTitle;
                    metadataUrl = '/api/serie/metadata?title=' + encodeURIComponent(serieTitle);
                } else {
                    // Para películas
                    metadataUrl = '/api/movie/metadata?title=' + encodeURIComponent(finalTitle);
                }

                if (movieYear) {
                    metadataUrl += '&year=' + movieYear;
                }

                fetch(metadataUrl)
                    .then(function(response) {
                        if (!response.ok) {
                            throw new Error('Error en la respuesta');
                        }
                        return response.json();
                    })
                    .then(function(data) {
                        if (data && data.title) {
                            mostrarMovieInfo(data);
                        } else {
                            mostrarNoInfo();
                        }
                    })
                    .catch(function(error) {
                        mostrarNoInfo();
                    });
            } else {
                mostrarNoInfo();
            }
        }, 500);

        function mostrarMovieInfo(data) {
            var section = document.getElementById('movie-info-section');
            var noInfo = document.getElementById('no-movie-info');

            if (!section) return;

            var html = '';

            html += '<div class="info-header">';

            if (data.poster) {
                html += '<div class="movie-poster">';
                html += '<img src="' + data.poster[0] + '" alt="' + data.title + '" onerror="this.onerror=null; this.src=\'' + data.poster[1] + '\';" />';
                html += '</div>';
            } else {
                html += '<div class="movie-poster-placeholder"><span>🎬<br>Sin imagen</span></div>';
            }

            html += '<div class="movie-header">';
            html += '<h2>' + data.title + (data.year ? ' <span class="movie-year">(' + data.year + ')</span></h2>' : '</h2>');

            html += '<div class="movie-meta">';
            if (data.runtime && data.runtime !== 'N/A') {
                html += '<span class="meta-item">⏱️ ' + data.runtime + '</span>';
            }
            if (data.released && data.released !== 'N/A') {
                html += '<span class="meta-item">📅 ' + data.released + '</span>';
            }
            if (data.imdb_rating && data.imdb_rating !== 'N/A') {
                html += '<span class="meta-item rating">⭐ ' + data.imdb_rating + '/10</span>';
            }
            html += '</div>';

            if (data.genres && data.genres.length > 0) {
                html += '<div class="genres">';
                data.genres.forEach(function(genre) {
                    html += '<span class="genre-tag">' + genre + '</span>';
                });
                html += '</div>';
            }

            html += '</div></div>';

            if (data.plot && data.plot !== 'N/A') {
                html += '<div class="plot">' + data.plot + '</div>';
            }

            html += '<div class="details-grid">';
            if (data.director && data.director !== 'N/A') {
                html += '<div class="detail-card"><div class="detail-label">Director</div><div class="detail-value">' + data.director + '</div></div>';
            }
            if (data.writer && data.writer !== 'N/A') {
                html += '<div class="detail-card"><div class="detail-label">Guionista</div><div class="detail-value">' + data.writer + '</div></div>';
            }
            if (data.country && data.country !== 'N/A') {
                html += '<div class="detail-card"><div class="detail-label">País</div><div class="detail-value">' + data.country + '</div></div>';
            }
            if (data.language && data.language !== 'N/A') {
                html += '<div class="detail-card"><div class="detail-label">Idioma</div><div class="detail-value">' + data.language + '</div></div>';
            }
            if (data.box_office && data.box_office !== 'N/A') {
                html += '<div class="detail-card"><div class="detail-label">Taquilla</div><div class="detail-value">' + data.box_office + '</div></div>';
            }
            if (data.awards && data.awards !== 'N/A') {
                html += '<div class="detail-card"><div class="detail-label">Premios</div><div class="detail-value">' + data.awards + '</div></div>';
            }
            html += '</div>';

            if (data.ratings && data.ratings.length > 0) {
                html += '<div class="ratings">';
                data.ratings.forEach(function(rating) {
                    var parts = rating.split(' ');
                    html += '<div class="rating-card"><div class="rating-source">' + parts[0] + '</div><div class="rating-value">' + (parts[1] || '') + '</div></div>';
                });
                html += '</div>';
            }

            if (data.cast && data.cast.length > 0) {
                html += '<div class="cast-section"><h3>Reparto principal</h3><div class="cast-list">';
                data.cast.forEach(function(actor) {
                    html += '<span class="cast-item">' + actor + '</span>';
                });
                html += '</div></div>';
            }

            section.innerHTML = html;
            section.style.display = 'block';
            if (noInfo) noInfo.style.display = 'none';
        }

        function mostrarNoInfo() {
            var section = document.getElementById('movie-info-section');
            var noInfo = document.getElementById('no-movie-info');

            if (section) section.style.display = 'none';
            if (noInfo) noInfo.style.display = 'block';
        }
    })();
    </script>
</body>
</html>

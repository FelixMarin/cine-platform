version: '3.8'

services:
  # ==========================================================================
  # SERVICIOS EXTERNOS
  # ==========================================================================
  
  # ===========================================
  # PostgreSQL Desarrollo (BASE DE DATOS PARA OAUTH2)
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: oauth2-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: oauth2_dev
      POSTGRES_USER: oauth2_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oauth2_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oauth2_user -d oauth2_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cine-network

  oauth2-server:
    image: felixmurcia/oauth2server:dev
    container_name: oauth2-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      # OAuth2 Clients
      - SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING=true
      - OAUTH2_CLIENTS=${OAUTH2_CLIENTS}
      - CINE_PLATFORM_SECRET=${OAUTH2_CLIENT_ID}
      - CINE_PLATFORM_REDIRECT_URI=${CINE_PLATFORM_REDIRECT_URI:-http://localhost:5000/oauth/callback}
      - TRANSCRIBERAPP_SECRET=${TRANSCRIBERAPP_SECRET}
      - TRANSCRIBERAPP_REDIRECT_URI=${TRANSCRIBERAPP_REDIRECT_URI:-http://localhost:9000/oauth/callback}
      # Database
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/oauth2_dev
      - SPRING_DATASOURCE_USERNAME=oauth2_user
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-oauth2_dev_password}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      # JPA
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL=true
      # SSL deshabilitado
      - SERVER_SSL_ENABLED=false
      - SSL_KEY_STORE=
      - SSL_KEY_STORE_PASSWORD=
      - SSL_KEY_ALIAS=
    volumes:
      - oauth2-data:/data
    networks:
      - cine-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - "9696:9696"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
    volumes:
      - prowlarr-config:/config
      - ${MOVIES_FOLDER}/mkv:/downloads
    networks:
      - cine-network

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    restart: unless-stopped
    ports:
      - "9117:9117"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
    volumes:
      - jackett-config:/config
      - ${MOVIES_FOLDER}/mkv:/downloads
    networks:
      - cine-network

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    restart: unless-stopped
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - TRANSMISSION_WEB_HOME=/combustion-release/
      - USER=${TRANSMISSION_USERNAME}
      - PASS=${TRANSMISSION_PASSWORD}
    volumes:
      - ${ADMIN_FOLDER}/transmission/config:/config
      - ${ADMIN_FOLDER}/downloads:/downloads
      - ${MOVIES_FOLDER}/mkv:/watch
    networks:
      - cine-network

  # ==========================================================================
  # FFMPEG API SERVICE
  # ==========================================================================
  ffmpeg-api:
    build:
      context: ../ffmpeg-cuda
      dockerfile: Dockerfile
    container_name: ffmpeg-api
    restart: unless-stopped
    runtime: nvidia
    entrypoint: []
    command: ["python3", "/app/app.py"]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    ports:
      - "8082:8080"
    volumes:
      - ${ADMIN_FOLDER}/ffmpeg/temp:/shared/temp
      - ${ADMIN_FOLDER}/ffmpeg/uploads:/shared/uploads
      - ${ADMIN_FOLDER}/ffmpeg/outputs:/shared/outputs
      - ${ADMIN_FOLDER}/downloads:/shared/input
    networks:
      - cine-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # POSTGRES PARA CINE APP DB
  # ==========================================================================
  cine-postgres:
    image: postgres:15-alpine
    container_name: cine-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: cine_app_db
      POSTGRES_USER: cine_app_user
      POSTGRES_PASSWORD: ${CINE_DB_PASSWORD:-cine_app_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - cine_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cine_app_user -d cine_app_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cine-network

  # ==========================================================================
  # FLYWAY MIGRATIONS
  # ==========================================================================
  flyway:
    image: flyway/flyway:latest
    container_name: cine-flyway
    command: migrate
    env_file:
      - .env.dev
    environment:
      - FLYWAY_URL=jdbc:postgresql://cine-postgres:5432/${CINE_DB_NAME}
      - FLYWAY_USER=${CINE_DB_USER}
      - FLYWAY_PASSWORD=${CINE_DB_PASSWORD}
      - FLYWAY_SCHEMAS=public
      - FLYWAY_BASELINE_ON_MIGRATE=true
      - FLYWAY_CONNECT_RETRIES=30
    volumes:
      - ./migrations:/flyway/sql
    depends_on:
      cine-postgres:
        condition: service_healthy
    networks:
      - cine-network
    profiles:
      - migrate

  # ==========================================================================
  # APLICACIÓN PRINCIPAL
  # ==========================================================================
  cine-platform:
    build: .
    container_name: cine-platform
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      oauth2-server:
        condition: service_healthy
      prowlarr:
        condition: service_started
      jackett:
        condition: service_started
      transmission:
        condition: service_started
      ffmpeg-api:
        condition: service_healthy
    env_file:
      - .env.dev
    ports:
      - "5000:5000"
    environment:
      FLASK_DEBUG: 0
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      MOVIES_FOLDER: /data/movies
      SECRET_KEY: ${SECRET_KEY}
      # OAuth2
      OAUTH2_URL: http://oauth2-server:8080
      PUBLIC_OAUTH2_URL: http://localhost:8080
      PUBLIC_REDIRECT_URI: http://localhost:5000/oauth/callback
      OAUTH2_TOKEN_ENDPOINT: /oauth/token
      OAUTH2_AUTHORIZE_ENDPOINT: /oauth2/authorize
      OAUTH2_USERINFO_ENDPOINT: /user/me
      OAUTH2_CLIENT_ID: ${OAUTH2_CLIENT_ID}
      OAUTH2_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET}
      MOVIES_BASE_PATH: ${MOVIES_FOLDER}/mkv
      # Indexers
      PROWLARR_URL: ${PROWLARR_URL}
      PROWLARR_API_KEY: ${PROWLARR_API_KEY}
      JACKETT_URL: ${JACKETT_URL}
      JACKETT_API_KEY: ${JACKETT_API_KEY}
      TRANSMISSION_URL: ${TRANSMISSION_URL}
      TRANSMISSION_USERNAME: ${TRANSMISSION_USERNAME}
      TRANSMISSION_PASSWORD: ${TRANSMISSION_PASSWORD}
      TRANSMISSION_DOWNLOAD_DIR: /downloads
      # FFmpeg API
      FFMPEG_API_URL: ${FFMPEG_API_URL}
    volumes:
      - ./static:/app/static
      - ${ADMIN_FOLDER}/ffmpeg/uploads:/app/uploads
      - ${ADMIN_FOLDER}/ffmpeg/temp:/app/temp
      - ${ADMIN_FOLDER}/ffmpeg/outputs:/app/outputs
      - ${ADMIN_FOLDER}/ffmpeg/logs:/app/logs
      - ${MOVIES_FOLDER}:/data/movies
      - ${MOVIES_FOLDER}/mkv:${MOVIES_FOLDER}/mkv
      - ${ADMIN_FOLDER}:${ADMIN_FOLDER}
      - ${ADMIN_FOLDER}/downloads:/downloads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cine-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${FLASK_PORT:-5000}/api/${HEALTH_CHECK_ENDPOINT:-auth/check}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ==========================================================================
# VOLÚMENES
# ==========================================================================
volumes:
  postgres_data:
    name: oauth2_postgres_dev_data
  oauth2-data:
    driver: local
  prowlarr-config:
    driver: local
  jackett-config:
    driver: local
  transmission-config:
    driver: local
  cine_postgres_data:
    name: cine_postgres_dev_data

# ==========================================================================
# REDES
# ==========================================================================
networks:
  cine-network:
    external: true
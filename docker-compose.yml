services:
  cine-platform:
    build: .
    container_name: cine-platform
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "5000:5000"
    environment:
      - FLASK_DEBUG=0
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - MOVIES_FOLDER=/data/movies
      - SECRET_KEY=${SECRET_KEY}
      
      # OAuth2 - Comunicación con OAuth2Server (que corre en host)
      - OAUTH2_URL=http://host.docker.internal:8080
      - PUBLIC_OAUTH2_URL=http://localhost:8080
      - PUBLIC_REDIRECT_URI=http://localhost:5000/oauth/callback
      
      # Endpoints (valores por defecto)
      - OAUTH2_TOKEN_ENDPOINT=/oauth/token
      - OAUTH2_AUTHORIZE_ENDPOINT=/oauth2/authorize
      - OAUTH2_USERINFO_ENDPOINT=/user/me
      
      # Credenciales (desde .env.dev)
      - OAUTH2_CLIENT_ID=${OAUTH2_CLIENT_ID}
      - OAUTH2_CLIENT_SECRET=${OAUTH2_CLIENT_SECRET}
      - MOVIES_BASE_PATH=/mnt/DATA_2TB/audiovisual/mkv
      
      # Indexers (usando nombres de servicio Docker)
      - PROWLARR_URL=http://prowlarr:9696
      - PROWLARR_API_KEY=${PROWLARR_API_KEY}
      - JACKETT_URL=http://jackett:9117
      - JACKETT_API_KEY=${JACKETT_API_KEY}
      - TRANSMISSION_URL=http://transmission:9091
      - TRANSMISSION_USERNAME=${TRANSMISSION_USERNAME}
      - TRANSMISSION_PASSWORD=${TRANSMISSION_PASSWORD}
    volumes:
      - ./uploads:/app/uploads
      - ./temp:/app/temp
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ${MOVIES_FOLDER}:/data/movies
      - /mnt/DATA_2TB/audiovisual/mkv:/mnt/DATA_2TB/audiovisual/mkv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cine-network

networks:
  cine-network:
    external: true
    name: cine-network
apiVersion: v1
kind: ConfigMap
metadata:
  name: cine-config
  namespace: cine
data:
  THUMBNAIL_FOLDER: "/data/thumbnails"

  # ============================
  # 🌍 Flask
  # ============================
  FLASK_HOST: "0.0.0.0"
  FLASK_PORT: "9443"

  # ============================
  # 🍪 Cookies y Sesiones (NO sensibles)
  # ============================
  SESSION_COOKIE_HTTPONLY: "True"
  SESSION_COOKIE_SAMESITE: "Lax"
  SESSION_COOKIE_SECURE: "False"
  SESSION_COOKIE_PATH: "/"

  MAX_CONTENT_LENGTH: "17179869184"

  # ============================
  # 🎬 Media / Streaming
  # ============================
  MOVIES_FOLDER: "/data/movies"
  OMDB_LANGUAGE: "es"

  # ============================
  # 🎞️ Video Optimization
  # ============================
  UPLOAD_FOLDER: "/app/uploads"
  TEMP_FOLDER: "/app/temp"
  OUTPUT_FOLDER: "/app/outputs"

  # ============================
  # 📝 Logging
  # ============================
  LOG_FOLDER: "/app/logs"

  # ============================
  # 🔑 OAuth2 Endpoints (NO sensibles)
  # ============================
  OAUTH2_AUTHORIZE_ENDPOINT: "/authorize"
  OAUTH2_TOKEN_ENDPOINT: "/oauth/token"
  OAUTH2_USERINFO_ENDPOINT: "/userinfo"

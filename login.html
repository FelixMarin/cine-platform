<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cine Platform</title>
    <link rel="stylesheet" href="/css/login.css">
    <style>
        .oauth-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .oauth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #666;
            font-size: 14px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }
        .divider span {
            padding: 0 16px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 Iniciar Sesión</h1>
        
        <!-- Botón OAuth2 -->
        <button type="button" class="oauth-button" onclick="startOAuth2()">
            🔐 Iniciar sesión con OAuth2
        </button>
        
        <div class="divider">
            <span>o usa tus credenciales</span>
        </div>
        
        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" 
                       id="username" 
                       name="username" 
                       required 
                       autofocus
                       value="">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       required>
            </div>
            
            <button type="submit">Iniciar Sesión</button>
        </form>
        
        <div class="info">
            <span class="brand">Powered by</span>
            <strong class="name">FelixMarin · Cine Platform</strong>
        </div>
    </div>

    <script>
        async function startOAuth2() {
            try {
                const response = await fetch('/api/auth/oauth2/start', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success && data.authorization_url) {
                    // Redirigir al servidor OAuth2
                    window.location.href = data.authorization_url;
                } else {
                    alert('Error al iniciar OAuth2: ' + (data.error || 'Error desconocido'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error al iniciar OAuth2');
            }
        }
    </script>
</body>
</html>
